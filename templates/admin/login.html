<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — DishaAI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>

    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div class="flash-container">
      {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">
        <span>{{ msg }}</span
        ><button onclick="this.parentElement.remove()">✕</button>
      </div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo admin-logo">🛡️</div>
          <h1>Admin Access</h1>
          <p>DishaAI Control Panel</p>
        </div>
        <form
          method="POST"
          action="{{ url_for('auth.admin_login') }}"
          class="auth-form"
        >
          <div class="form-group">
            <label for="email">Admin Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="admin@careerAI.com"
              required
              class="form-input"
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              class="form-input"
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            Access Panel →
          </button>
        </form>
        <div class="auth-footer">
          <p><a href="{{ url_for('auth.index') }}">← Back to CareerAI</a></p>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
